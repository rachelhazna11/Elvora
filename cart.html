<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart — ELVORA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.15.12/dist/cdn.min.js"></script>
</head>
<body>
  <div id="nav-root"></div>
  <main x-data="{ _r: false }" x-init="if (window.Alpine?.stores?.cart) { _r=true } else { window.addEventListener('elvora:ready', () => { _r=true }, {once:true}) }" class="cart-page" id="cart-main">
  <div class="cart-page-inner">
    <div style="margin-bottom:20px;">
      <button onclick="history.length > 1 ? history.back() : (window.location.href='/shop.html')"
        style="display:inline-flex;align-items:center;gap:8px;background:none;border:none;cursor:pointer;font-family:var(--font-body);font-size:13px;letter-spacing:0.08em;color:var(--text-muted);padding:0;text-transform:uppercase;"
        aria-label="Go back">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
        Back
      </button>
    </div>
    <h1 class="cart-page-heading">Your Bag
      <span
        x-show="_r && $store.cart.count > 0"
        x-text="_r ? '(' + $store.cart.count + ' item' + ($store.cart.count !== 1 ? 's' : '') + ')' : ''"
        style="font-size:16px;font-weight:400;color:var(--text-muted);font-family:var(--font-body);margin-left:12px;display:none;"
      ></span>
    </h1>

    <!-- Empty state — shown when cart has no items -->
    <div
      x-show="_r && $store.cart.items.length === 0"
      class="cart-empty"
      style="display:none;"
    >
      <svg width="64" height="64" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24" class="cart-empty-icon" aria-hidden="true">
        <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" stroke-linecap="round"/>
        <line x1="3" y1="6" x2="21" y2="6"/>
        <path d="M16 10a4 4 0 01-8 0" stroke-linecap="round"/>
      </svg>
      <p style="font-family:var(--font-display);font-size:22px;font-weight:700;color:var(--charcoal);">Your bag is empty</p>
      <p style="font-size:14px;color:var(--text-muted);max-width:320px;line-height:1.8;">
        Discover our premium activewear collection and find pieces made for your movement.
      </p>
      <a href="/shop.html" class="btn-primary" style="margin-top:8px;">Shop Now</a>
    </div>

    <!-- Cart grid — shown when items exist -->
    <div
      x-show="_r && $store.cart.items.length > 0"
      class="cart-layout"
      style="display:none;"
    >
      <!-- Left column: items list -->
      <div>
        <div style="border-top: 1.5px solid rgba(168,191,163,0.3);">
          <template x-for="item in (_r ? $store.cart.items : [])" :key="item.key">
            <div class="cart-item-row">
              <!-- Product image -->
              <div>
                <template x-if="item.image">
                  <img
                    :src="item.image"
                    :alt="item.name"
                    class="cart-item-image"
                    loading="lazy"
                  >
                </template>
                <template x-if="!item.image">
                  <div class="cart-item-image" style="background:var(--sage-light);"></div>
                </template>
              </div>

              <!-- Item details + stepper -->
              <div class="cart-item-details">
                <p class="cart-item-name" x-text="item.name"></p>
                <p class="cart-item-variant" x-text="[item.colour, item.size].filter(Boolean).join(' / ')"></p>

                <!-- Qty stepper -->
                <div class="cart-qty-stepper" style="margin-top:12px;">
                  <button
                    @click="$store.cart.setQty(item.key, item.qty - 1)"
                    class="cart-qty-btn"
                    :aria-label="'Decrease quantity of ' + item.name"
                  >−</button>
                  <span class="cart-qty-display" x-text="item.qty"></span>
                  <button
                    @click="$store.cart.setQty(item.key, item.qty + 1)"
                    class="cart-qty-btn"
                    :aria-label="'Increase quantity of ' + item.name"
                  >+</button>
                </div>

                <button
                  @click="$store.cart.remove(item.key)"
                  class="cart-item-remove"
                  :aria-label="'Remove ' + item.name + ' from bag'"
                >Remove</button>
              </div>

              <!-- Right: line total -->
              <div class="cart-item-right">
                <p class="cart-item-line-total"
                  x-text="'Rp ' + (item.price * item.qty).toLocaleString('id-ID')"
                ></p>
              </div>
            </div>
          </template>
        </div>

        <!-- Continue shopping link -->
        <div style="margin-top:32px;">
          <a href="/shop.html" class="view-all" style="font-size:12px;">&#8592; Continue Shopping</a>
        </div>
      </div>

      <!-- Right column: order summary -->
      <aside>
        <div class="order-summary" aria-label="Order summary">
          <h2 class="order-summary-title">Order Summary</h2>

          <div class="order-summary-row">
            <span>Subtotal</span>
            <span x-text="_r ? $store.cart.totalFormatted : ''"></span>
          </div>

          <div class="order-summary-row">
            <span>Shipping</span>
            <span style="color:var(--sage);font-size:12px;letter-spacing:1px;text-transform:uppercase;">Free</span>
          </div>

          <div class="order-summary-row total">
            <span>Total</span>
            <span x-text="_r ? $store.cart.totalFormatted : ''"></span>
          </div>

          <p class="order-summary-shipping-note" style="margin:16px 0 20px;">Free shipping on all orders</p>

          <a
            href="/checkout.html"
            class="btn-primary"
            style="width:100%;text-align:center;box-sizing:border-box;display:block;"
            aria-label="Proceed to checkout"
          >Proceed to Checkout</a>
        </div>
      </aside>
    </div>
  </div>
</main>
  <div id="footer-root"></div>
  <script src="/js/__env.js"></script>
  <script type="module" src="/js/supabase.js"></script>
  <script type="module" src="/js/admin-redirect.js"></script>
  <script type="module" src="/js/cart.js"></script>
  <script type="module" src="/js/components.js"></script>
</body>
</html>
