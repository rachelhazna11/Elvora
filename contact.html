<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — ELVORA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.15.12/dist/cdn.min.js"></script>
</head>
<body>
  <div id="nav-root"></div>

  <main>

    <!-- ═══ Contact Hero ══════════════════════════════════════════════════════ -->
    <div class="contact-hero">
      <p class="section-label">Get in Touch</p>
      <h1 class="shop-hero-title" style="color:var(--charcoal);">We'd Love to<br>Hear From You</h1>
    </div>

    <!-- ═══ Contact Body ══════════════════════════════════════════════════════ -->
    <div
      class="contact-body"
      x-data="{
        name: '',
        email: '',
        message: '',
        showToast: false,
        loading: false,
        _toastTimer: null,
        async submitForm() {
          if (!this.name || !this.email || !this.message) return;
          this.loading = true;
          try {
            const { error } = await window.supabase
              .from('contacts')
              .insert({ name: this.name, email: this.email, message: this.message });
            if (error) throw error;
            this.name = '';
            this.email = '';
            this.message = '';
            this.showToast = true;
            clearTimeout(this._toastTimer);
            this._toastTimer = setTimeout(() => { this.showToast = false; }, 4000);
          } catch (err) {
            console.error('Contact form error:', err);
            alert('Terjadi kesalahan. Silakan coba lagi.');
          } finally {
            this.loading = false;
          }
        }
      }"
    >
      <div class="contact-grid">

        <!-- Left: Contact Info -->
        <div>
          <h2 class="contact-info-title">Let's Connect</h2>
          <p class="contact-info-text">Have a question about sizing, shipping, or want to collaborate? We're here. Real humans, real answers — usually within 24 hours.</p>
          <div class="contact-detail">
            <div class="contact-detail-icon">📧</div>
            <span class="contact-detail-text">hello@elvora.id</span>
          </div>
          <div class="contact-detail">
            <div class="contact-detail-icon">📱</div>
            <span class="contact-detail-text">+62 812-ELVORA</span>
          </div>
          <div class="contact-detail">
            <div class="contact-detail-icon">📍</div>
            <span class="contact-detail-text">Jakarta, Indonesia</span>
          </div>
          <div class="contact-detail">
            <div class="contact-detail-icon">🕐</div>
            <span class="contact-detail-text">Mon–Sat, 9AM – 6PM WIB</span>
          </div>
        </div>

        <!-- Right: Contact Form -->
        <div class="contact-form">
          <form @submit.prevent="submitForm">
            <div class="form-group">
              <label class="form-label">Full Name</label>
              <input class="form-input" type="text" x-model="name" placeholder="Your name" required>
            </div>
            <div class="form-group">
              <label class="form-label">Email</label>
              <input class="form-input" type="email" x-model="email" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
              <label class="form-label">Message</label>
              <textarea class="form-input form-textarea" x-model="message" placeholder="Tell us more..." required></textarea>
            </div>
            <button class="form-submit" type="submit" :disabled="loading">
              <span x-show="!loading">Send Message</span>
              <span x-show="loading" style="display:none;">Sending…</span>
            </button>
          </form>
        </div>

      </div>

      <!-- Success pop-up overlay -->
      <template x-if="showToast">
        <div
          x-transition:enter="transition-opacity duration-300"
          x-transition:enter-start="opacity-0"
          x-transition:enter-end="opacity-100"
          x-transition:leave="transition-opacity duration-200"
          x-transition:leave-start="opacity-100"
          x-transition:leave-end="opacity-0"
          @click.self="showToast = false"
          style="position:fixed; top:0; left:0; right:0; bottom:0; z-index:500; display:flex; align-items:center; justify-content:center; background:rgba(46,46,46,0.45); backdrop-filter:blur(4px);"
        >
          <div style="background:#fff; border-radius:28px; padding:48px 40px; max-width:380px; width:calc(100% - 48px); text-align:center; box-shadow:0 24px 80px rgba(46,46,46,0.18);">
            <div style="width:60px;height:60px;border-radius:50%;background:var(--sage-light);display:flex;align-items:center;justify-content:center;margin:0 auto 24px;">
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--sage)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <p style="font-family:var(--font-display);font-size:26px;font-weight:700;color:var(--charcoal);margin-bottom:10px;line-height:1.2;">Message Received</p>
            <p style="font-size:14px;color:var(--text-muted);font-weight:300;line-height:1.7;margin-bottom:32px;">Thank you for reaching out.<br>We'll reply within 24 hours 💌</p>
            <button
              @click="showToast = false"
              style="font-family:var(--font-body);font-size:11px;letter-spacing:2px;text-transform:uppercase;font-weight:500;color:var(--charcoal);background:none;border:none;border-bottom:1px solid var(--charcoal);padding-bottom:2px;cursor:pointer;"
            >Close</button>
          </div>
        </div>
      </template>
    </div>

  </main>

  <div id="footer-root"></div>
  <script src="/js/__env.js"></script>
  <script type="module" src="/js/supabase.js"></script>
  <script type="module" src="/js/admin-redirect.js"></script>
  <script type="module" src="/js/cart.js"></script>
  <script type="module" src="/js/components.js"></script>
</body>
</html>
